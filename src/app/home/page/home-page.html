<h1>Create new player</h1>

<label for="name">Name:</label>
<input type="text" id="name" name="name" required (input)="onNameInput($event)"
    [attr.aria-invalid]="!isValid() ? true : null" aria-describedby="invalid-helper">
@if (!isValid()) {
<small id="invalid-helper">
    Please provide a value!
</small>
}

<button (click)="onJoin()" [disabled]="!isValid()">Join</button>
